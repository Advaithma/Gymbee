<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gymbee 🐝</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  :root{
    --bg:#0D0D0D;
    --surface:#1A1A1A;
    --surface2:#222;
    --accent:#FFD600;
    --accent2:#FF6B00;
    --text:#F5F5F5;
    --muted:#888;
    --green:#4CAF50;
    --blue:#4A9EFF;
    --red:#FF4444;
    --yellow:#FFD600;
  }
  body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:hidden;}
  .screen{display:none;min-height:100vh;}
  .screen.active{display:flex;flex-direction:column;}

  /* SPLASH */
  #splash{align-items:center;justify-content:center;text-align:center;padding:40px 20px;background:radial-gradient(ellipse at 50% 30%, #1a1500 0%, #0D0D0D 70%);}
  .bee-logo{font-size:80px;animation:float 3s ease-in-out infinite;display:block;margin-bottom:16px;}
  @keyframes float{0%,100%{transform:translateY(0);}50%{transform:translateY(-12px);}}
  .app-name{font-family:'Bebas Neue',cursive;font-size:72px;letter-spacing:4px;color:var(--accent);line-height:1;}
  .tagline{font-size:16px;color:var(--muted);margin:12px 0 48px;letter-spacing:1px;}
  .btn-primary{background:var(--accent);color:#000;border:none;padding:18px 48px;font-family:'Bebas Neue',cursive;font-size:22px;letter-spacing:2px;border-radius:50px;cursor:pointer;transition:all 0.2s;width:100%;max-width:320px;}
  .btn-primary:hover{background:#ffe033;transform:translateY(-2px);box-shadow:0 8px 30px rgba(255,214,0,0.3);}

  /* FORM */
  #form-screen{padding:32px 20px;max-width:480px;margin:0 auto;width:100%;}
  .form-header{margin-bottom:32px;}
  .form-title{font-family:'Bebas Neue',cursive;font-size:42px;color:var(--text);line-height:1;}
  .form-sub{color:var(--muted);font-size:14px;margin-top:6px;}
  .bmi-live{background:var(--surface);border-radius:16px;padding:16px 20px;margin-bottom:24px;display:flex;align-items:center;justify-content:space-between;}
  .bmi-label{font-size:13px;color:var(--muted);}
  .bmi-value{font-family:'Bebas Neue',cursive;font-size:32px;color:var(--accent);}
  .bmi-badge{padding:4px 12px;border-radius:20px;font-size:12px;font-weight:600;}
  .field-group{margin-bottom:20px;}
  .field-label{font-size:13px;color:var(--muted);margin-bottom:8px;display:block;font-weight:600;letter-spacing:0.5px;text-transform:uppercase;}
  .field-row{display:flex;gap:8px;align-items:stretch;}
  .field-input{background:var(--surface);border:2px solid #333;border-radius:12px;padding:14px 16px;color:var(--text);font-size:16px;font-family:'DM Sans',sans-serif;flex:1;transition:border-color 0.2s;-webkit-appearance:none;}
  .field-input:focus{outline:none;border-color:var(--accent);}
  .unit-toggle{display:flex;background:var(--surface);border-radius:12px;overflow:hidden;border:2px solid #333;}
  .unit-btn{padding:0 14px;background:none;border:none;color:var(--muted);font-size:13px;font-family:'DM Sans',sans-serif;cursor:pointer;transition:all 0.2s;font-weight:600;}
  .unit-btn.active{background:var(--accent);color:#000;}
  .gender-row{display:flex;gap:8px;}
  .gender-btn{flex:1;padding:12px;background:var(--surface);border:2px solid #333;border-radius:12px;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:14px;cursor:pointer;transition:all 0.2s;font-weight:600;}
  .gender-btn.active{border-color:var(--accent);color:var(--accent);}
  .goal-preview{background:var(--surface);border-radius:12px;padding:14px 16px;margin-bottom:24px;font-size:14px;color:var(--muted);}
  .goal-preview span{color:var(--accent);font-weight:700;}

  /* DASHBOARD */
  #dashboard{padding:0;}
  .dash-header{padding:24px 20px 0;background:linear-gradient(180deg,#1a1500 0%,var(--bg) 100%);}
  .dash-logo{font-family:'Bebas Neue',cursive;font-size:28px;color:var(--accent);letter-spacing:2px;}
  .stats-card{background:var(--surface);border-radius:20px;padding:20px;margin:16px 0;}
  .stats-row{display:flex;gap:12px;margin-bottom:12px;}
  .stat-chip{flex:1;background:var(--bg);border-radius:12px;padding:12px;text-align:center;}
  .stat-chip-val{font-family:'Bebas Neue',cursive;font-size:26px;color:var(--accent);}
  .stat-chip-lbl{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;}
  .weekly-quote{font-size:13px;color:var(--muted);font-style:italic;line-height:1.5;border-left:3px solid var(--accent);padding-left:12px;}
  .day-tabs-wrap{padding:0 20px;overflow-x:auto;scrollbar-width:none;}
  .day-tabs-wrap::-webkit-scrollbar{display:none;}
  .day-tabs{display:flex;gap:8px;padding:16px 0;width:max-content;}
  .day-tab{padding:10px 18px;background:var(--surface);border:2px solid transparent;border-radius:50px;font-family:'Bebas Neue',cursive;font-size:16px;letter-spacing:1px;cursor:pointer;transition:all 0.2s;color:var(--muted);white-space:nowrap;}
  .day-tab:hover{border-color:#333;color:var(--text);}
  .day-tab.active{background:var(--accent);color:#000;border-color:var(--accent);}
  .day-tab.today{border-color:var(--accent);color:var(--accent);}
  .day-tab.today.active{background:var(--accent);color:#000;}
  .day-content{padding:0 20px 100px;}
  .day-header{margin-bottom:16px;}
  .day-focus{font-family:'Bebas Neue',cursive;font-size:32px;color:var(--text);}
  .day-focus span{color:var(--accent);}
  .progress-bar-wrap{background:var(--surface);border-radius:50px;height:8px;margin-bottom:20px;overflow:hidden;}
  .progress-bar-fill{height:100%;background:var(--accent);border-radius:50px;transition:width 0.5s ease;}
  .progress-text{font-size:12px;color:var(--muted);margin-bottom:8px;}
  .exercise-card{background:var(--surface);border-radius:16px;padding:18px;margin-bottom:12px;border:2px solid transparent;transition:all 0.2s;position:relative;}
  .exercise-card.done{border-color:var(--accent);opacity:0.7;}
  .ex-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;}
  .ex-name{font-family:'Bebas Neue',cursive;font-size:20px;color:var(--text);line-height:1.1;}
  .ex-check{width:28px;height:28px;border-radius:50%;border:2px solid #444;background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.2s;}
  .ex-check.checked{background:var(--accent);border-color:var(--accent);}
  .ex-check.checked::after{content:'✓';font-size:14px;color:#000;font-weight:700;}
  .ex-badges{display:flex;gap:8px;flex-wrap:wrap;margin:10px 0;}
  .badge{padding:4px 10px;border-radius:20px;font-size:12px;font-weight:600;}
  .badge-sets{background:#1e3a2f;color:#4CAF50;}
  .badge-rest{background:#1a1a2e;color:#4A9EFF;}
  .ex-tip{font-size:13px;color:var(--muted);font-style:italic;line-height:1.5;}
  .ex-tip::before{content:'🐝 ';}

  /* REST DAY */
  .rest-day{text-align:center;padding:60px 20px;}
  .rest-bee{font-size:80px;display:block;margin-bottom:20px;}
  .rest-title{font-family:'Bebas Neue',cursive;font-size:42px;color:var(--accent);}
  .rest-msg{color:var(--muted);margin-top:12px;line-height:1.6;font-size:15px;}
  .rest-quote{color:var(--text);font-size:18px;margin-top:24px;font-style:italic;}

  /* BOTTOM BAR */
  .bottom-bar{position:fixed;bottom:0;left:0;right:0;padding:16px 20px;background:linear-gradient(0deg,var(--bg) 60%,transparent);display:flex;gap:12px;}
  .btn-outline{flex:1;background:transparent;border:2px solid #333;color:var(--muted);padding:14px;border-radius:50px;font-family:'Bebas Neue',cursive;font-size:18px;letter-spacing:1px;cursor:pointer;transition:all 0.2s;}
  .btn-outline:hover{border-color:var(--accent);color:var(--accent);}

  /* CONFETTI */
  .confetti-wrap{position:fixed;top:0;left:0;right:0;bottom:0;pointer-events:none;z-index:999;}
  .confetti-piece{position:absolute;width:10px;height:10px;opacity:0;animation:confettiFall 3s ease-in forwards;}
  @keyframes confettiFall{0%{opacity:1;transform:translateY(-20px) rotate(0deg);}100%{opacity:0;transform:translateY(100vh) rotate(720deg);}}

  /* RESPONSIVE */
  @media(max-width:400px){
    .app-name{font-size:56px;}
    .day-focus{font-size:26px;}
  }
</style>
</head>
<body>

<!-- SPLASH -->
<div id="splash" class="screen active">
  <span class="bee-logo">🐝</span>
  <div class="app-name">GYMBEE</div>
  <div class="tagline">YOUR FIRST STEP STARTS HERE</div>
  <button class="btn-primary" onclick="showScreen('form-screen')">Get Started →</button>
</div>

<!-- FORM -->
<div id="form-screen" class="screen">
  <div class="form-header">
    <div class="form-title">Tell us<br>about you</div>
    <div class="form-sub">Gymbee uses this to build a plan made just for you 🐝</div>
  </div>

  <div class="bmi-live">
    <div>
      <div class="bmi-label">YOUR BMI</div>
      <div class="bmi-value" id="bmi-display">--</div>
    </div>
    <div class="bmi-badge" id="bmi-badge" style="background:#333;color:#888;">Enter stats</div>
  </div>

  <div class="field-group">
    <label class="field-label">Height</label>
    <div class="field-row">
      <input class="field-input" id="height-input" type="number" placeholder="170" oninput="updateBMI()">
      <div class="unit-toggle">
        <button class="unit-btn active" id="h-cm" onclick="setHeightUnit('cm')">cm</button>
        <button class="unit-btn" id="h-ft" onclick="setHeightUnit('ft')">ft</button>
      </div>
    </div>
  </div>

  <div class="field-group">
    <label class="field-label">Weight</label>
    <div class="field-row">
      <input class="field-input" id="weight-input" type="number" placeholder="70" oninput="updateBMI()">
      <div class="unit-toggle">
        <button class="unit-btn active" id="w-kg" onclick="setWeightUnit('kg')">kg</button>
        <button class="unit-btn" id="w-lbs" onclick="setWeightUnit('lbs')">lbs</button>
      </div>
    </div>
  </div>

  <div class="field-group">
    <label class="field-label">Target Weight</label>
    <div class="field-row">
      <input class="field-input" id="target-input" type="number" placeholder="65" oninput="updateGoal()">
      <div style="padding:14px 16px;color:var(--muted);font-size:14px;" id="target-unit-label">kg</div>
    </div>
  </div>

  <div class="field-group">
    <label class="field-label">Age</label>
    <input class="field-input" id="age-input" type="number" placeholder="25" style="max-width:120px;">
  </div>

  <div class="field-group">
    <label class="field-label">Gender</label>
    <div class="gender-row">
      <button class="gender-btn active" id="g-male" onclick="setGender('male')">Male</button>
      <button class="gender-btn" id="g-female" onclick="setGender('female')">Female</button>
      <button class="gender-btn" id="g-other" onclick="setGender('other')">Other</button>
    </div>
  </div>

  <div class="goal-preview" id="goal-preview">Your goal will appear here as you enter your stats</div>

  <button class="btn-primary" onclick="buildPlan()" style="margin-bottom:40px;">Build My Plan 🐝</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="screen">
  <div class="dash-header">
    <div class="dash-logo">🐝 GYMBEE</div>
    <div class="stats-card">
      <div class="stats-row">
        <div class="stat-chip">
          <div class="stat-chip-val" id="dash-bmi">--</div>
          <div class="stat-chip-lbl">BMI</div>
        </div>
        <div class="stat-chip">
          <div class="stat-chip-val" id="dash-category" style="font-size:18px;">--</div>
          <div class="stat-chip-lbl">Category</div>
        </div>
        <div class="stat-chip">
          <div class="stat-chip-val" id="dash-goal" style="font-size:16px;">--</div>
          <div class="stat-chip-lbl">Goal</div>
        </div>
      </div>
      <div class="weekly-quote" id="dash-quote"></div>
    </div>
  </div>

  <div class="day-tabs-wrap">
    <div class="day-tabs" id="day-tabs"></div>
  </div>

  <div class="day-content" id="day-content"></div>

  <div class="bottom-bar">
    <button class="btn-outline" onclick="showScreen('form-screen')">← Start Over</button>
  </div>
</div>

<div class="confetti-wrap" id="confetti-wrap"></div>

// HELPERS
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}

function setHeightUnit(u) {
  state.heightUnit = u;
  document.getElementById('h-cm').classList.toggle('active', u==='cm');
  document.getElementById('h-ft').classList.toggle('active', u==='ft');
  document.getElementById('height-input').placeholder = u==='cm'?'170':'5.7';
  updateBMI();
}

function setWeightUnit(u) {
  state.weightUnit = u;
  document.getElementById('w-kg').classList.toggle('active', u==='kg');
  document.getElementById('w-lbs').classList.toggle('active', u==='lbs');
  document.getElementById('weight-input').placeholder = u==='kg'?'70':'154';
  document.getElementById('target-input').placeholder = u==='kg'?'65':'143';
  document.getElementById('target-unit-label').textContent = u;
  updateBMI();
}

function setGender(g) {
  state.gender = g;
  ['male','female','other'].forEach(x => document.getElementById('g-'+x).classList.remove('active'));
  document.getElementById('g-'+g).classList.add('active');
}

function getWeightKg() {
  const w = parseFloat(document.getElementById('weight-input').value);
  return state.weightUnit === 'lbs' ? w * 0.453592 : w;
}

function getHeightM() {
  const h = parseFloat(document.getElementById('height-input').value);
  if (state.heightUnit === 'ft') {
    const feet = Math.floor(h);
    const inches = (h - feet) * 10;
    return (feet * 12 + inches) * 0.0254;
  }
  return h / 100;
}

function getBMICategory(bmi) {
  if (bmi < 18.5) return 'underweight';
  if (bmi < 25) return 'normal';
  if (bmi < 30) return 'overweight';
  return 'obese';
}

function getBMILabel(bmi) {
  if (bmi < 18.5) return ['Underweight','#4A9EFF','#0a1a2e'];
  if (bmi < 25) return ['Normal','#4CAF50','#0a1e0a'];
  if (bmi < 30) return ['Overweight','#FFD600','#1a1500'];
  return ['Obese','#FF4444','#1e0a0a'];
}

function updateBMI() {
  const wKg = getWeightKg();
  const hM = getHeightM();
  if (!wKg || !hM || isNaN(wKg) || isNaN(hM)) return;
  const bmi = wKg / (hM * hM);
  const [label, color, bg] = getBMILabel(bmi);
  document.getElementById('bmi-display').textContent = bmi.toFixed(1);
  const badge = document.getElementById('bmi-badge');
  badge.textContent = label;
  badge.style.background = bg;
  badge.style.color = color;
  updateGoal();
}

function updateGoal() {
  const w = getWeightKg();
  const t = parseFloat(document.getElementById('target-input').value);
  const tw = state.weightUnit === 'lbs' ? t * 0.453592 : t;
  if (!w || !tw || isNaN(w) || isNaN(tw)) return;
  const diff = tw - w;
  let goal, color;
  if (diff < -1) { goal = 'Fat Loss 🔥'; color = '#FF6B00'; }
  else if (diff > 1) { goal = 'Muscle Gain 💪'; color = '#4CAF50'; }
  else { goal = 'Maintenance ⚖️'; color = '#4A9EFF'; }
  document.getElementById('goal-preview').innerHTML = `Your goal: <span style="color:${color};font-weight:700;">${goal}</span>`;
}

function getGoalKey(wKg, twKg) {
  const diff = twKg - wKg;
  if (diff < -1) return 'fat_loss';
  if (diff > 1) return 'muscle_gain';
  return 'maintenance';
}

function buildPlan() {
  const wKg = getWeightKg();
  const hM = getHeightM();
  const t = parseFloat(document.getElementById('target-input').value);
  const twKg = state.weightUnit === 'lbs' ? t * 0.453592 : t;
  const age = document.getElementById('age-input').value;

  if (!wKg || !hM || !twKg || !age) {
    alert('Please fill in all fields 🐝');
    return;
  }

  const bmi = wKg / (hM * hM);
  const cat = getBMICategory(bmi);
  const goal = getGoalKey(wKg, twKg);
  const key = `${cat}_${goal}`;
  const planData = DB[key] || DB['normal_maintenance'];

  state.plan = planData;
  state.userStats = { bmi: bmi.toFixed(1), category: cat, goal: goal.replace('_',' '), bmiLabel: getBMILabel(bmi)[0] };
  state.completed = {};

  // Set today's day
  const todayIdx = (new Date().getDay() + 6) % 7; // Mon=0
  state.activeDay = todayIdx;

  renderDashboard();
  showScreen('dashboard');
}

function renderDashboard() {
  const s = state.userStats;
  document.getElementById('dash-bmi').textContent = s.bmi;
  document.getElementById('dash-category').textContent = s.bmiLabel;
  document.getElementById('dash-goal').textContent = s.goal.replace('fat loss','Fat Loss').replace('muscle gain','Muscle Gain').replace('maintenance','Maintain');
  document.getElementById('dash-quote').textContent = state.plan.quote;

  // Day tabs
  const todayIdx = (new Date().getDay() + 6) % 7;
  const tabsEl = document.getElementById('day-tabs');
  tabsEl.innerHTML = '';
  DAYS.forEach((d, i) => {
    const btn = document.createElement('button');
    btn.className = 'day-tab' + (i === state.activeDay ? ' active' : '') + (i === todayIdx ? ' today' : '');
    btn.textContent = d.slice(0,3).toUpperCase();
    btn.onclick = () => { state.activeDay = i; renderDay(); updateTabs(); };
    tabsEl.appendChild(btn);
  });

  renderDay();
}

function updateTabs() {
  const todayIdx = (new Date().getDay() + 6) % 7;
  document.querySelectorAll('.day-tab').forEach((btn, i) => {
    btn.className = 'day-tab' + (i === state.activeDay ? ' active' : '') + (i === todayIdx ? ' today' : '');
  });
}

function renderDay() {
  const i = state.activeDay;
  const exercises = state.plan.plans[i];
  const content = document.getElementById('day-content');

  if (i === 6) {
    content.innerHTML = `
      <div class="rest-day">
        <span class="rest-bee">🐝</span>
        <div class="rest-title">Rest Day</div>
        <div class="rest-msg">Rest is part of the plan.<br>Your muscles grow while you recover.</div>
        <div class="rest-quote">"Recovery is progress too."</div>
      </div>`;
    return;
  }

  const key = `day_${i}`;
  const done = state.completed[key] || [];
  const total = exercises.length;
  const doneCount = done.length;
  const pct = total > 0 ? (doneCount / total * 100) : 0;

  let html = `
    <div class="day-header">
      <div class="day-focus">${DAYS[i]} <span>/ ${DAY_FOCUS[i]}</span></div>
    </div>
    <div class="progress-text">${doneCount} / ${total} exercises done</div>
    <div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:${pct}%"></div></div>
  `;

  exercises.forEach((ex, idx) => {
    const isDone = done.includes(idx);
    html += `
      <div class="exercise-card ${isDone?'done':''}" id="ex-card-${idx}">
        <div class="ex-top">
          <div class="ex-name">${ex.name}</div>
          <div class="ex-check ${isDone?'checked':''}" onclick="toggleExercise(${i},${idx})"></div>
        </div>
        <div class="ex-badges">
          <span class="badge badge-sets">${ex.sets} sets × ${ex.reps} reps</span>
          ${ex.rest > 0 ? `<span class="badge badge-rest">⏱ ${ex.rest}s rest</span>` : ''}
        </div>
        <div class="ex-tip">${ex.tip}</div>
      </div>`;
  });

  content.innerHTML = html;
}

function toggleExercise(dayIdx, exIdx) {
  const key = `day_${dayIdx}`;
  if (!state.completed[key]) state.completed[key] = [];
  const arr = state.completed[key];
  const pos = arr.indexOf(exIdx);
  if (pos === -1) arr.push(exIdx);
  else arr.splice(pos, 1);

  const exercises = state.plan.plans[dayIdx];
  if (arr.length === exercises.length && exercises.length > 0) {
    setTimeout(() => launchConfetti(), 100);
  }
  renderDay();
}

function launchConfetti() {
  const wrap = document.getElementById('confetti-wrap');
  wrap.innerHTML = '';
  const colors = ['#FFD600','#FF6B00','#4CAF50','#4A9EFF','#FF4444','#fff'];
  for (let i = 0; i < 60; i++) {
    const piece = document.createElement('div');
    piece.className = 'confetti-piece';
    piece.style.cssText = `
      left:${Math.random()*100}%;
      top:-10px;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      border-radius:${Math.random()>0.5?'50%':'2px'};
      width:${6+Math.random()*8}px;
      height:${6+Math.random()*8}px;
      animation-delay:${Math.random()*0.5}s;
      animation-duration:${2+Math.random()*2}s;
    `;
    wrap.appendChild(piece);
  }
  setTimeout(() => { wrap.innerHTML = ''; }, 4000);
}
</script>
